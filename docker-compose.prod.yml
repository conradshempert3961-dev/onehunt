services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onehunt_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - onehunt

  miniapp:
    build:
      context: .
      dockerfile: Dockerfile.miniapp
    container_name: onehunt_miniapp
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - onehunt

  site:
    build:
      context: .
      dockerfile: landing/Dockerfile
    container_name: onehunt_site
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    networks:
      - onehunt

  huntdriver:
    build:
      context: .
      dockerfile: Dockerfile.huntdriver
    container_name: onehunt_huntdriver
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    networks:
      - onehunt

  postgres:
    image: postgres:16-alpine
    container_name: onehunt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onehunt
      POSTGRES_USER: onehunt
      POSTGRES_PASSWORD: onehunt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onehunt -d onehunt"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - onehunt

  redis:
    image: redis:7-alpine
    container_name: onehunt_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - onehunt

volumes:
  pgdata:

networks:
  onehunt:
    driver: bridge
